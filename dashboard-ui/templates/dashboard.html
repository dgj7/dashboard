<!DOCTYPE html>
<html lang="en">
    <head>
        <title>dashboard</title>
        <link rel="stylesheet" href="/static/html.css">
        <link rel="stylesheet" href="/static/layout.css">
        <link rel="stylesheet" href="/static/dashboard/app.css">
        <link rel="stylesheet" href="/static/dashboard/status.css">
    </head>

    <body>
        <div>
            <div class="header">
                <h1>dashboard</h1>
            </div>
            <div class="sidebar">
                <ul>
                    <li>opt1</li>
                    <li>opt2</li>
                    <li>opt3</li>
                </ul>
            </div>
            <div class="content">
                {% for app in apps %}
                    <div id="{{ app.name }}" class="application">
                        <div class="app-name">{{ app.name }}</div>
                        {% for env in app.environments %}
                            <div id="{{ env.name }}_{{ app.name }}" class="env">{{ env.name }}</div>
                        {% endfor %}
                    </div>
                {% endfor %}
            </div>
        </div>
    </body>
</html>
